<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Dashboard{% endblock %}</title>
    <style>
        /* --- Reset & basic --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f6f8; color: #333; }

        /* --- Header --- */
        header { background-color: #4a90e2; color: white; padding: 20px; text-align: center; font-size: 24px; font-weight: bold; }

        /* --- Navbar --- */
        nav { background-color: #fff; padding: 10px 20px; display: flex; gap: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        nav a { text-decoration: none; color: #4a90e2; font-weight: 500; }
        nav a:hover { text-decoration: underline; }

        /* --- Container --- */
        .container { padding: 20px; max-width: 1000px; margin: auto; }

        /* --- Table Styling --- */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background-color: #fff; }
        th, td { padding: 12px 15px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #4a90e2; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }

        /* --- Forms --- */
        input[type="text"], input[type="email"], input[type="tel"], select {
            padding: 8px 10px; width: 100%; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc;
        }
        button {
            background-color: #4a90e2; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;
        }
        button:hover { background-color: #357ABD; }

        /* --- Cards for Dashboard --- */
        .cards { display: flex; gap: 20px; margin-top: 20px; }
        .card { flex: 1; padding: 20px; background-color: white; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }

    </style>
</head>
<body>

<header>Enrollment Dashboard</header>

<nav>
    <a href="{% url 'dashboard' %}">Dashboard</a>
    <a href="{% url 'users' %}">Users</a>
    <a href="{% url 'courses' %}">Courses</a>
    <a href="{% url 'records' %}">Records</a>
    <a href="{% url 'enroll' %}">Enroll Student</a>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
